<!DOCTYPE html>
<html>
  <head>
    <title>Page Analyzer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div>
      <h2>Page Analyzer</h2>
      <p>Click below to analyze the current page:</p>
      <button id="analyze">Analyze Page</button>
      <div id="results"></div>
      <script src="popup.js"></script>
    </div>
    <div>
      <h2>Page Screenshot</h2>
      <p>Click below to screenshoot the current page:</p>
      <button id="screenshoot">Snap Page</button>
      <div id="results-snap"></div>
      <script src="snap.js"></script>
    </div>
        <div>
      <h2>AI Insights</h2>
      <p>Click below to get AI insights on webpage:</p>
      <button id="chatbot-btn">Chat Page</button>
      <div id="results-chatbot"></div>
      <script src="chatbot.js"></script>
    </div>
  </body>
</html>
